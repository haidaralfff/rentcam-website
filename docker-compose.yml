services:
  # PHP + Apache Service
  web:
    build: .
    container_name: rentcam_web
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-password}
      - DB_NAME=${DB_NAME:-rentcam}
      - DB_DRIVER=mysqli
      - BASE_URL=http://localhost/
      - ENVIRONMENT=development
    depends_on:
      - db
    networks:
      - rentcam_network
    restart: unless-stopped

  # MySQL Database Service
  db:
    image: mysql:5.7
    container_name: rentcam_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-password}
      MYSQL_DATABASE: ${DB_NAME:-rentcam}
      MYSQL_USER: ${DB_USER:-rentcam}
      MYSQL_PASSWORD: ${DB_PASS:-password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - rentcam_network
    restart: unless-stopped

  # PHPMyAdmin untuk manage database (optional)
  phpmyadmin:
    image: phpmyadmin
    container_name: rentcam_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-root}
      PMA_PASSWORD: ${DB_PASS:-password}
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - rentcam_network
    restart: unless-stopped

volumes:
  db_data:
    driver: local

networks:
  rentcam_network:
    driver: bridge

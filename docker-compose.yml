version: '3.8'

services:
  # Database MariaDB
  db:
    image: mariadb:10.6
    container_name: rentcam-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rentcam
      MYSQL_USER: rentcam_user
      MYSQL_PASSWORD: rentcam_password
    volumes:
      - ./docker-data/db:/var/lib/mysql
    networks:
      - rentcam-network

  # Aplikasi RENTCAM
  app:
    build: .
    container_name: rentcam-app
    restart: always
    ports:
      - "8080:80"
    environment:
      BASE_URL: http://localhost:8080/
      DB_HOST: db
      DB_USER: rentcam_user
      DB_PASS: rentcam_password
      DB_NAME: rentcam
    depends_on:
      - db
    networks:
      - rentcam-network

  # PHPMyAdmin (Opsional untuk manajemen DB)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: rentcam-pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db
    networks:
      - rentcam-network

networks:
  rentcam-network:
    driver: bridge
